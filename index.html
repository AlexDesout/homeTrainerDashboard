<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeTrainer - Dashboard</title>
      <link rel="stylesheet" href="styles.css">

</head>

<body>

    <header>
        Simulation <span>Physiologique</span> Active
    </header>

    <div class="dashboard-container">
        <div class="card speed-card">
            <div class="card-title">Vitesse</div>
            <div class="card-value" id="val-speed">aucune valeur</div>
            <div class="card-unit">km/h</div>
        </div>

        <div class="card bpm-card">
            <div class="card-title">Fréq. Cardiaque</div>
            <div class="card-value" id="val-bpm">aucune valeur</div>
            <div class="card-unit">BPM</div>
        </div>

        <div class="card spo2-card">
            <div class="card-title">Oxygène (SpO2)</div>
            <div class="card-value" id="val-spo2">aucune valeur</div>
            <div class="card-unit">%</div>
        </div>

        <div class="card temp-card">
            <div class="card-title">Température</div>
            <div class="card-value" id="val-temp">aucune valeur</div>
            <div class="card-unit">°C</div>
        </div>
    </div>

    <div class="status-bar" id="status-message">
        Statut du joueur : <span class="status-ok">AUCUNE VALEUR</span>
    </div>
    <script src="app.js"></script>
</body>

</html>
